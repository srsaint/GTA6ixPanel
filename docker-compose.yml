services:
  postgres:
    image: postgres:16-alpine
    container_name: license-admin-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: license_admin
      POSTGRES_PASSWORD: license_admin_password
      POSTGRES_DB: license_admin
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
